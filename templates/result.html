<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generated Cyberpunk Image</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
    <main class="container">
        <h1>Generation Result</h1>
        <p><strong>Prompt:</strong> {{ prompt }}</p>
        <p class="params">
            Steps: {{ params.num_inference_steps }} |
            Guidance: {{ params.guidance_scale }} |
            Size: {{ params.width }}x{{ params.height }} |
            Seed: {{ params.seed if params.seed is not none else 'random' }}
        </p>

        <div class="image-card">
            <img src="{{ image_url }}" alt="Generated cyberpunk city image" />
        </div>

        <a class="back-link" href="/">← Generate another image</a>
    </main>
</body>
</html>
